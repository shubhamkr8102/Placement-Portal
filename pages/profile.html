<div class="container">

<div class="card">

<h2>Student Profile</h2>

<input
type="text"
ng-model="student.username"
placeholder="Name">

<input
type="email"
ng-model="student.email"
placeholder="Email">

<input
type="number"
ng-model="student.mobile"
placeholder="Mobile">

<button ng-click="saveProfile()">
Update Profile
</button>

</div>

</div>
